<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180" role="img" aria-label="VaultReader demo banner">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b91c1c" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="720" height="180" fill="url(#g)"/>
  <rect width="720" height="180" fill="url(#dots)"/>
  <g font-family="system-ui, -apple-system, sans-serif" fill="#7f1d1d">
    <text x="40" y="78" font-size="36" font-weight="700">VaultReader</text>
    <text x="40" y="110" font-size="16" font-weight="400" opacity="0.8">A self-hosted reader for your Obsidian vaults</text>
    <text x="40" y="140" font-size="12" font-weight="500" opacity="0.55" letter-spacing="0.08em">DEMO BANNER · BUNDLED ASSET</text>
  </g>
  <g transform="translate(540, 30)" stroke="#b91c1c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35">
    <circle cx="60" cy="60" r="50"/>
    <circle cx="60" cy="60" r="34"/>
    <circle cx="60" cy="60" r="18"/>
    <line x1="60" y1="10" x2="60" y2="110"/>
    <line x1="10" y1="60" x2="110" y2="60"/>
  </g>
</svg>
