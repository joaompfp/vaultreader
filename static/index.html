<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultReader</title>
  <link rel="icon" href="/obsidian.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script defer src="/alpine.min.js"></script>
</head>
<body>

<div id="app" x-data="vaultApp()" x-init="init()">

  <div class="sidebar-scrim" x-show="sidebarOpen" @click="sidebarOpen = false"></div>

  <!-- ─── Sidebar (file commander) ─────────────── -->
  <div id="sidebar" :class="{ closed: !sidebarOpen }">

    <!-- App header -->
    <div class="sidebar-header">
      <img src="/obsidian.svg" class="app-icon" alt="Obsidian">
      <span class="app-title">Vaults</span>
      <button class="btn-icon" @click="sidebarOpen = false" title="Close">✕</button>
    </div>

    <!-- Vault icon row -->
    <div class="vault-icons">
      <template x-for="v in vaults" :key="v">
        <button class="vault-btn"
                :class="{ active: activeVault === v }"
                :title="v.charAt(0).toUpperCase() + v.slice(1)"
                @click="enterDir(v, ''); activePath = ''">
          <span class="vault-btn-icon" x-html="vaultIcon(v)"></span>
        </button>
      </template>
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb" x-show="activeVault">
      <span class="bc-item" @click="enterDir(activeVault, '')" x-text="activeVault" style="cursor:pointer"></span>
      <template x-for="(seg, i) in cwdSegments()" :key="i">
        <span>
          <span class="bc-sep">/</span>
          <span class="bc-item" @click="enterDir(activeVault, cwdUpTo(i))" x-text="seg" style="cursor:pointer"></span>
        </span>
      </template>
    </div>

    <!-- File listing (flat, file-commander style) -->
    <div class="file-list">
      <!-- Up dir -->
      <div class="fl-item fl-up" x-show="cwd !== ''" @click="goUp()">
        <span class="fl-icon">⬆</span>
        <span class="fl-name">..</span>
      </div>

      <!-- Dirs first -->
      <template x-for="item in currentDirs()" :key="item.path">
        <div class="fl-item fl-dir" @click="enterDir(activeVault, item.path)"
             @contextmenu.prevent="openCtxMenu($event, item)">
          <span class="fl-icon">📁</span>
          <span class="fl-name" x-text="item.name"></span>
        </div>
      </template>

      <!-- Files -->
      <template x-for="item in currentFiles()" :key="item.path">
        <div class="fl-item fl-file" :class="{ active: item.path === activePath }"
             @click="openNote(activeVault, item.path)"
             @contextmenu.prevent="openCtxMenu($event, item)">
          <span class="fl-icon">📄</span>
          <span class="fl-name" x-text="item.name.replace(/\.md$/, '')"></span>
        </div>
      </template>

      <!-- Empty -->
      <template x-if="currentDirs().length === 0 && currentFiles().length === 0 && activeVault">
        <div style="padding:14px;font-size:13px;color:var(--text3)">Empty folder</div>
      </template>
    </div>
  </div>

  <!-- ─── Main ────────────────────────────────── -->
  <div id="main">
    <!-- Toolbar -->
    <div id="toolbar">
      <button class="btn-icon" @click="sidebarOpen = !sidebarOpen" title="Toggle sidebar">☰</button>

      <div class="toolbar-title">
        <template x-if="activePath">
          <span class="toolbar-breadcrumb">
            <span class="tb-vault" @click="enterDir(activeVault, ''); activePath = ''" x-text="activeVault"></span>
            <template x-for="(seg, i) in activeBreadcrumbs()" :key="i">
              <span>
                <span class="tb-sep">/</span>
                <span class="tb-seg" @click="navigateToSegment(i)" x-text="seg"></span>
              </span>
            </template>
            <span class="tb-sep">/</span>
            <strong class="tb-note" x-text="noteTitle()"></strong>
          </span>
        </template>
        <template x-if="!activePath && activeVault">
          <span class="tb-vault" @click="enterDir(activeVault, '')" x-text="activeVault" style="cursor:default;opacity:.7"></span>
        </template>
        <template x-if="!activePath && !activeVault">
          <span style="color:var(--text3)">Select a vault</span>
        </template>
      </div>

      <span x-show="saveStatus" :class="'save-status ' + saveStatus" x-text="saveStatusText()"></span>

      <template x-if="activeVault">
        <div class="btn-new-wrap">
          <button class="btn-icon btn-newnote" @click.stop="toggleNewMenu($event)" title="New… (Ctrl+N)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <div class="new-dropdown" x-show="newMenuOpen"
               :style="'top:'+newMenuY+'px;left:'+newMenuX+'px'"
               @click.stop @click.outside="newMenuOpen=false" style="display:none">
            <button class="new-dropdown-item" @click="newMenuOpen=false; promptCreateNote()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              New note
              <span class="new-dropdown-kbd">Ctrl+N</span>
            </button>
            <button class="new-dropdown-item" @click="newMenuOpen=false; promptCreateFolder()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              New folder
            </button>
          </div>
        </div>
      </template>

      <button class="btn-icon" @click="searchOpen = true" title="Search (Ctrl+K)">🔍</button>

      <template x-if="activePath">
        <div class="btn-group">
          <button class="btn" :class="{ active: mode === 'preview' }" @click="setMode('preview')">Preview</button>
          <button class="btn" :class="{ active: mode === 'edit' }" @click="setMode('edit')">Edit</button>
        </div>
      </template>

      <template x-if="activePath">
        <button class="btn-icon btn-copylink" :class="{ copied: copyLinkDone }" @click="copyNoteLink()"
                :title="copyLinkDone ? 'Copied!' : 'Copy wikilink (Ctrl+Shift+C)'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <g x-show="!copyLinkDone">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </g>
            <polyline x-show="copyLinkDone" points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </template>

      <button class="btn-icon btn-backlinks" :class="{ active: backlinksOpen }" @click="backlinksOpen = !backlinksOpen" title="Backlinks (incoming links)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span x-show="backlinks.length > 0" class="bl-badge" x-text="backlinks.length"></span>
      </button>
    </div>

    <!-- Content area -->
    <div id="content-area">

      <!-- Frontmatter bar -->
      <div x-show="activePath && Object.keys(noteFrontmatter).length > 0" class="frontmatter-bar">
        <button class="fm-toggle" @click="frontmatterOpen = !frontmatterOpen">
          <span x-text="frontmatterOpen ? '▼' : '▶'"></span>
          frontmatter
          <span x-text="'(' + Object.keys(noteFrontmatter).length + ' fields)'"></span>
        </button>
        <div x-show="frontmatterOpen" x-transition class="fm-content">
          <template x-for="[key, val] in Object.entries(noteFrontmatter)" :key="key">
            <div class="fm-field">
              <span class="fm-key" x-text="key + ':'"></span>
              <span class="fm-val" x-text="Array.isArray(val) ? val.join(', ') : String(val)"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- No vault selected → welcome + recents -->
      <template x-if="!activePath && !activeVault">
        <div class="empty-state">
          <div class="icon">📄</div>
          <template x-if="recentFiles.length === 0">
            <p>Select a vault to get started</p>
          </template>
          <template x-if="recentFiles.length > 0">
            <div class="recent-files">
              <p class="recent-label">Recent</p>
              <template x-for="r in recentFiles" :key="r.vault + r.path">
                <div class="recent-item" @click="openNote(r.vault, r.path)">
                  <span class="recent-vault" x-text="r.vault"></span>
                  <span class="recent-title" x-text="r.title || r.path.split('/').pop().replace(/\.md$/, '')"></span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Vault root selected but no note → show recents if at root, folder view otherwise -->
      <template x-if="!activePath && activeVault">
        <div class="folder-view">
          <!-- vault root: show recents + folder list -->
          <template x-if="cwd === ''">
            <div>
              <template x-if="recentFiles.length > 0">
                <div class="fv-section">
                  <div class="fv-header">
                    <span class="fv-title">Recent</span>
                  </div>
                  <div class="fv-list">
                    <template x-for="r in recentFiles" :key="r.vault + r.path">
                      <div class="fv-item fv-item-note" @click="openNote(r.vault, r.path)">
                        <span class="fv-icon">◈</span>
                        <span class="fv-name" x-text="r.title || r.path.split('/').pop().replace(/\.md$/, '')"></span>
                        <span class="fv-meta fv-vault" x-text="r.vault"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
              <div class="fv-section">
                <div class="fv-header">
                  <span class="fv-title" x-text="activeVault"></span>
                  <div class="fv-sort-btns">
                    <button class="fv-sort-btn" :class="{active: folderSort==='name'}" @click="folderSort='name'">Name</button>
                    <button class="fv-sort-btn" :class="{active: folderSort==='date'}" @click="folderSort='date'">Date</button>
                    <button class="fv-sort-btn" :class="{active: folderSort==='size'}" @click="folderSort='size'">Size</button>
                  </div>
                </div>
                <div class="fv-list">
                  <template x-for="item in sortedFolderItems()" :key="item.path">
                    <div class="fv-item" :class="item.isDir ? 'fv-item-dir' : 'fv-item-note'"
                         @click="item.isDir ? enterDir(activeVault, item.path) : openNote(activeVault, item.path)"
                         @contextmenu.prevent="openCtxMenu($event, item)">
                      <span class="fv-icon" x-text="item.isDir ? '▶' : '◈'"></span>
                      <span class="fv-name" x-text="item.isDir ? item.name : item.name.replace(/\.md$/,'')"></span>
                      <span class="fv-meta" x-text="fvMeta(item)"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- inside a subfolder: just the folder contents -->
          <template x-if="cwd !== ''">
            <div class="fv-section">
              <div class="fv-header">
                <span class="fv-title" x-text="cwd.split('/').pop()"></span>
                <div class="fv-sort-btns">
                  <button class="fv-sort-btn" :class="{active: folderSort==='name'}" @click="folderSort='name'">Name</button>
                  <button class="fv-sort-btn" :class="{active: folderSort==='date'}" @click="folderSort='date'">Date</button>
                  <button class="fv-sort-btn" :class="{active: folderSort==='size'}" @click="folderSort='size'">Size</button>
                </div>
              </div>
              <div class="fv-list">
                <template x-for="item in sortedFolderItems()" :key="item.path">
                  <div class="fv-item" :class="item.isDir ? 'fv-item-dir' : 'fv-item-note'"
                       @click="item.isDir ? enterDir(activeVault, item.path) : openNote(activeVault, item.path)"
                       @contextmenu.prevent="openCtxMenu($event, item)">
                    <span class="fv-icon" x-text="item.isDir ? '▶' : '◈'"></span>
                    <span class="fv-name" x-text="item.isDir ? item.name : item.name.replace(/\.md$/,'')"></span>
                    <span class="fv-meta" x-text="fvMeta(item)"></span>
                  </div>
                </template>
                <template x-if="sortedFolderItems().length === 0">
                  <p class="fv-empty">Empty folder</p>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Preview mode -->
      <div id="preview"
           x-show="activePath && mode === 'preview'"
           x-html="noteHtml"
           @click="handlePreviewClick($event)">
      </div>

      <!-- Editor mode -->
      <div id="editor-wrap"
           x-show="activePath && mode === 'edit'"
           style="display:none">
        <div id="cm-editor"></div>
      </div>

    </div>
  </div>

  <!-- ─── Backlinks backdrop ───────────────────── -->
  <div class="bl-backdrop" x-show="backlinksOpen" @click="backlinksOpen = false"
       x-transition:enter="transition-opacity ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition-opacity ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"></div>

  <!-- ─── Backlinks ────────────────────────────── -->
  <div id="backlinks" :class="{ closed: !backlinksOpen }">
    <div class="backlinks-header">
      <h2>Backlinks</h2>
      <span class="count" x-text="backlinks.length"></span>
      <button class="bl-close" @click="backlinksOpen = false" aria-label="Close backlinks" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="backlinks-list">
      <template x-if="backlinks.length === 0">
        <p style="padding:14px;font-size:13px;color:var(--text3)">No backlinks.</p>
      </template>
      <template x-for="bl in backlinks" :key="bl.vault + ':' + bl.path">
        <div class="backlink-item" @click="openNote(bl.vault, bl.path)">
          <div class="backlink-title" x-text="bl.title || bl.path"></div>
          <div class="backlink-excerpt" x-show="bl.excerpt" x-text="bl.excerpt"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- ─── Search overlay ───────────────────────── -->
  <div id="search-overlay"
       x-show="searchOpen"
       x-transition.opacity
       @click.self="searchOpen = false"
       @keydown.escape.window="searchOpen = false">
    <div class="search-box">
      <div class="search-input-wrap">
        <span>🔍</span>
        <input type="text" placeholder="Search notes…"
          x-model="searchQuery"
          @input.debounce.300ms="doSearch()"
          @keydown.arrow-down.prevent="searchFocus = Math.min(searchFocus + 1, searchResults.length - 1)"
          @keydown.arrow-up.prevent="searchFocus = Math.max(searchFocus - 1, 0)"
          @keydown.enter.prevent="openSearchResult(searchFocus)"
          x-ref="searchInput" autocomplete="off">
      </div>
      <div class="search-results">
        <template x-if="searchQuery && searchResults.length === 0">
          <div class="search-empty">No results for "<span x-text="searchQuery"></span>"</div>
        </template>
        <template x-for="(r, i) in searchResults" :key="r.vault + ':' + r.path">
          <div class="search-result"
               :class="{ focused: searchFocus === i }"
               @click="openSearchResult(i)"
               @mouseenter="searchFocus = i">
            <div class="sr-path" x-text="r.vault + ' / ' + r.path"></div>
            <div class="sr-title" x-text="r.title || r.path"></div>
            <div class="sr-excerpt" x-show="r.excerpt" x-html="highlightMatch(r.excerpt, searchQuery)"></div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- ─── Modal Dialog ────────────────────────── -->
  <div id="modal-overlay"
       x-show="modal.open"
       x-transition.opacity
       @click.self="modal.open = false"
       @keydown.escape.window="modal.open = false"
       style="display:none">
    <div class="modal-box">
      <div class="modal-title" x-text="modal.title"></div>
      <input class="modal-input" type="text"
             x-model="modal.value"
             x-ref="modalInput"
             @keydown.enter.prevent="confirmModal()"
             @keydown.escape.prevent="modal.open = false"
             :placeholder="modal.placeholder">
      <div class="modal-error" x-show="modal.error" x-text="modal.error"></div>
      <div class="modal-actions">
        <button class="btn" @click="modal.open = false">Cancel</button>
        <button class="btn btn-primary" @click="confirmModal()" x-text="modal.confirmLabel || 'OK'"></button>
      </div>
    </div>
  </div>

  <!-- ─── Context Menu ──────────────────────────── -->
  <div id="ctx-menu"
       x-show="ctxMenu.open"
       :style="'top:' + ctxMenu.y + 'px;left:' + ctxMenu.x + 'px'"
       @click.outside="ctxMenu.open = false"
       style="display:none">
    <template x-for="item in ctxMenu.items" :key="item.label">
      <button class="ctx-item" :class="item.danger ? 'ctx-danger' : ''"
              @click="item.action(); ctxMenu.open = false"
              x-text="item.label"></button>
    </template>
  </div>

  <!-- ─── Settings pane ────────────────────────── -->
  <div id="settings-pane" x-show="settingsOpen" @click.self="settingsOpen=false"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       style="display:none">
    <div class="settings-box" @click.stop>
      <div class="settings-header">
        <span class="settings-title">VaultReader</span>
        <button class="btn-icon" @click="settingsOpen=false" title="Close">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Dark mode</span>
        <button class="settings-toggle" :class="{on: darkMode}" @click="toggleDark()">
          <span class="settings-toggle-knob"></span>
        </button>
      </div>
      <div class="settings-version">v1.7.0</div>
    </div>
  </div>

  <!-- ─── Status Bar ──────────────────────────── -->
  <div id="status-bar">
    <button class="sb-brand-btn" @click.stop="settingsOpen = !settingsOpen" title="Settings">VaultReader
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;flex-shrink:0">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <span class="sb-sep">·</span>
    <span class="sb-context" x-html="sbContext()"></span>
    <span class="sb-sync" :class="'sb-sync-' + syncState" :title="syncTitle()">
      <span class="sb-sync-dot"></span>
      <span class="sb-sync-label" x-text="syncLabel()"></span>
    </span>
  </div>

</div><!-- #app -->

<!-- ─── CodeMirror 6 (local IIFE bundle) ─────── -->
<script src="/codemirror.bundle.js"></script>
<script>
const { EditorView, keymap, lineNumbers } = CM
const { EditorState } = CM
const { defaultKeymap, history, historyKeymap, indentWithTab } = CM
const { markdown } = CM
const { oneDark } = CM

const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches

window.__cmAPI = {
  view: null,

  create(content, onChange) {
    if (this.view) { this.view.destroy(); this.view = null }
    const extensions = [
      history(),
      keymap.of([...defaultKeymap, ...historyKeymap, indentWithTab]),
      lineNumbers(),
      markdown(),
      EditorView.lineWrapping,
      EditorView.updateListener.of(update => {
        if (update.docChanged) onChange(update.state.doc.toString())
      }),
    ]
    if (prefersDark) extensions.push(oneDark)
    this.view = new EditorView({
      state: EditorState.create({ doc: content, extensions }),
      parent: document.getElementById('cm-editor')
    })
  },

  setContent(content) {
    if (!this.view) return
    const cur = this.view.state.doc.toString()
    if (cur === content) return
    this.view.dispatch({ changes: { from: 0, to: cur.length, insert: content } })
  },

  getContent() { return this.view ? this.view.state.doc.toString() : '' },
  destroy() { if (this.view) { this.view.destroy(); this.view = null } }
}
</script>

<!-- ─── Alpine App ─────────────────────────────── -->
<script>
function vaultApp() {
  return {
    vaults: [],
    activeVault: '',
    // flat list of all nodes in current vault
    allNodes: [],
    // current directory path ('' = root)
    cwd: '',
    activePath: '',
    noteRaw: '',
    noteHtml: '',
    noteFrontmatter: {},
    backlinks: [],
    mode: 'preview',
    sidebarOpen: true,
    backlinksOpen: false,
    frontmatterOpen: false,
    searchQuery: '',
    searchResults: [],
    searchFocus: 0,
    searchOpen: false,
    isDirty: false,
    saveStatus: '',
    saveTimer: null,
    recentFiles: [],
    _recentKey() { return 'vr-recent-' + (this.activeVault || '_global') },
    // status bar
    totalNotes: 0,
    vaultStats: [],
    syncAvailable: false,
    syncState: 'unknown',
    syncMessage: '',
    // folder view
    folderSort: 'name',
    // copy link
    copyLinkDone: false,
    // modal dialog
    modal: { open: false, title: '', value: '', placeholder: '', error: '', confirmLabel: 'OK', onConfirm: null },
    // context menu
    ctxMenu: { open: false, x: 0, y: 0, items: [] },
    // new item dropdown
    newMenuOpen: false,
    // settings
    settingsOpen: false,
    darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
    newMenuX: 0,
    newMenuY: 0,

    // ── init ──────────────────────────────────────
    async init() {
      window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault()
          this.searchOpen = true
          this.$nextTick(() => this.$refs.searchInput?.focus())
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
          e.preventDefault()
          if (this.activePath) this.copyNoteLink()
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n' && !e.shiftKey) {
          e.preventDefault()
          if (this.activeVault) this.promptCreateNote()
        }
        if (e.key === 'Escape') {
          this.ctxMenu.open = false
          this.newMenuOpen = false
          this.settingsOpen = false
        }
      })
      window.addEventListener('click', () => { this.ctxMenu.open = false })
      this.$watch('searchOpen', v => {
        if (v) {
          this.searchQuery = ''
          this.searchResults = []
          this.searchFocus = 0
          this.$nextTick(() => this.$refs.searchInput?.focus())
        }
      })
      // one-time migration: move old global recents into per-vault buckets
      const legacyKey = 'vr-recent'
      const legacy = JSON.parse(localStorage.getItem(legacyKey) || '[]')
      if (legacy.length) {
        const byVault = {}
        for (const r of legacy) {
          const v = r.vault || '_global'
          if (!byVault[v]) byVault[v] = []
          if (byVault[v].length < 7) byVault[v].push(r)
        }
        for (const [v, items] of Object.entries(byVault)) {
          localStorage.setItem('vr-recent-' + v, JSON.stringify(items))
        }
        localStorage.removeItem(legacyKey)
      }

      // restore dark mode preference
      const saved = localStorage.getItem('vr-dark')
      if (saved !== null) {
        this.darkMode = saved === '1'
        document.documentElement.setAttribute('data-theme', this.darkMode ? 'dark' : 'light')
      }

      try {
        const res = await fetch('/api/vaults')
        this.vaults = await res.json()
        if (this.vaults.length > 0) {
          this.activeVault = this.vaults[0]
          await this.enterDir(this.activeVault, '')
          this.recentFiles = JSON.parse(localStorage.getItem(this._recentKey()) || '[]')
        }
      } catch(e) { console.error('init:', e) }
      // load status bar stats
      this.refreshStats()
      setInterval(() => this.refreshSyncStatus(), 10000)
    },

    async refreshStats() {
      try {
        const [sr, sy] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/sync-status').then(r => r.json())
        ])
        this.totalNotes = sr.totalNotes || 0
        this.vaultStats = sr.vaults || []
        this.syncAvailable = sy.available
        this.syncState = sy.state
        this.syncMessage = sy.message || ''
      } catch(e) { console.error('stats:', e) }
    },

    async refreshSyncStatus() {
      try {
        const sy = await fetch('/api/sync-status').then(r => r.json())
        this.syncAvailable = sy.available
        this.syncState = sy.state
        this.syncMessage = sy.message || ''
      } catch(e) {}
    },

    syncLabel() {
      if (!this.syncAvailable) return 'sync'
      if (this.syncState === 'synced') return 'synced'
      if (this.syncState === 'syncing') return this.syncMessage || 'syncing'
      return 'sync error'
    },

    syncTitle() {
      if (!this.syncAvailable) return 'Syncthing: not configured'
      if (this.syncState === 'synced') return 'Syncthing: up to date'
      if (this.syncState === 'syncing') return 'Syncthing: syncing — ' + (this.syncMessage || '')
      return 'Syncthing: error'
    },

    // ── file commander navigation ──────────────────
    async enterDir(vault, path) {
      const vaultChanged = vault !== this.activeVault
      this.activeVault = vault
      this.cwd = path
      this.allNodes = []
      try {
        const res = await fetch('/api/tree?vault=' + encodeURIComponent(vault))
        const tree = await res.json()
        this.allNodes = this.flattenTree(tree)
      } catch(e) { console.error('enterDir:', e) }
      if (vaultChanged) {
        this.recentFiles = JSON.parse(localStorage.getItem(this._recentKey()) || '[]')
      }
    },

    // flatten recursive tree into flat array
    flattenTree(nodes) {
      const result = []
      for (const n of nodes) {
        result.push(n)
        if (n.isDir && n.children) {
          result.push(...this.flattenTree(n.children))
        }
      }
      return result
    },

    // items directly inside cwd
    currentItems() {
      return this.allNodes.filter(n => {
        const p = n.path
        const prefix = this.cwd ? this.cwd + '/' : ''
        if (!p.startsWith(prefix)) return false
        const rest = p.slice(prefix.length)
        // direct child = no more slashes
        return !rest.includes('/')
      })
    },

    currentDirs()  {
      return this.currentItems().filter(n => n.isDir)
        .sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'}))
    },
    currentFiles() {
      return this.currentItems().filter(n => !n.isDir)
        .sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'}))
    },

    // sorted items for the main-pane folder view (dirs first, then files)
    sortedFolderItems() {
      const dirs = [...this.currentDirs()]
      const files = [...this.currentFiles()]
      const cmp = (a, b) => {
        if (this.folderSort === 'date') return (b.mtime || 0) - (a.mtime || 0)
        if (this.folderSort === 'size') return (b.size || 0) - (a.size || 0)
        return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
      }
      dirs.sort(cmp)
      files.sort(cmp)
      return [...dirs, ...files]
    },

    fvMeta(item) {
      if (item.isDir) {
        // count direct children
        const prefix = item.path + '/'
        const children = this.allNodes.filter(n => {
          const rest = n.path.slice(prefix.length)
          return n.path.startsWith(prefix) && !rest.includes('/')
        })
        const fc = children.filter(n => !n.isDir).length
        const dc = children.filter(n => n.isDir).length
        const parts = []
        if (dc > 0) parts.push(dc + (dc === 1 ? ' folder' : ' folders'))
        if (fc > 0) parts.push(fc + (fc === 1 ? ' note' : ' notes'))
        return parts.join(', ') || 'empty'
      }
      if (this.folderSort === 'size' && item.size > 0) {
        return item.size < 1024 ? item.size + ' B'
          : item.size < 1024*1024 ? Math.round(item.size/1024) + ' KB'
          : (item.size/1024/1024).toFixed(1) + ' MB'
      }
      if (item.mtime) {
        const d = new Date(item.mtime * 1000)
        const now = new Date()
        const diff = now - d
        if (diff < 60000) return 'just now'
        if (diff < 3600000) return Math.floor(diff/60000) + 'm ago'
        if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago'
        if (diff < 7*86400000) return Math.floor(diff/86400000) + 'd ago'
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
      }
      return ''
    },

    // breadcrumb segments for cwd
    cwdSegments() {
      if (!this.cwd) return []
      return this.cwd.split('/')
    },

    // path up to segment index i (inclusive)
    cwdUpTo(i) {
      return this.cwdSegments().slice(0, i + 1).join('/')
    },

    goUp() {
      if (!this.cwd) return
      const parts = this.cwd.split('/')
      parts.pop()
      this.cwd = parts.join('/')
    },

    // ── open note ─────────────────────────────────
    async openNote(vault, path) {
      this.activeVault = vault
      this.activePath = path
      this.frontmatterOpen = false
      this.mode = 'preview'
      this.searchOpen = false

      // navigate sidebar to the folder containing this note
      const parts = path.split('/')
      parts.pop()
      this.cwd = parts.join('/')

      try {
        const url = '/api/note?vault=' + encodeURIComponent(vault) +
                    '&path=' + encodeURIComponent(path)
        const res = await fetch(url)
        if (res.status === 404) {
          this.noteHtml = '<div class="note-missing"><p>This note no longer exists.</p><p>It may have been deleted or moved.</p></div>'
          this.noteRaw = ''
          this.noteFrontmatter = {}
          this.backlinks = []
          return
        }
        if (!res.ok) throw new Error('HTTP ' + res.status)
        const data = await res.json()
        this.noteRaw = data.raw || ''
        this.noteHtml = data.html || ''
        this.noteFrontmatter = data.frontmatter || {}
        this.backlinks = data.backlinks || []
        this.isDirty = false
        this.saveStatus = ''
        if (window.__cmAPI) window.__cmAPI.destroy()
        this._recordRecent(vault, path, this.noteTitle())
      } catch(e) { console.error('openNote:', e) }
    },

    // ── mode switch ───────────────────────────────
    setMode(m) {
      if (m === this.mode) return
      this.mode = m
      if (m === 'edit') {
        this.$nextTick(() => {
          if (window.__cmAPI) {
            window.__cmAPI.create(this.noteRaw, (content) => {
              this.noteRaw = content
              this.isDirty = true
              this.scheduleSave()
            })
          }
        })
      } else {
        this.rerenderPreview()
      }
    },

    async rerenderPreview() {
      if (this.isDirty) await this.saveNow()
      const url = '/api/note?vault=' + encodeURIComponent(this.activeVault) +
                  '&path=' + encodeURIComponent(this.activePath)
      try {
        const res = await fetch(url)
        const data = await res.json()
        this.noteHtml = data.html || ''
        this.noteFrontmatter = data.frontmatter || {}
        this.backlinks = data.backlinks || []
      } catch(e) { /* ignore */ }
    },

    // ── auto-save ─────────────────────────────────
    scheduleSave() {
      if (this.saveTimer) clearTimeout(this.saveTimer)
      this.saveTimer = setTimeout(() => this.saveNow(), 1500)
    },

    async saveNow() {
      if (!this.activePath || !this.isDirty) return
      this.saveStatus = 'saving'
      try {
        const url = '/api/note?vault=' + encodeURIComponent(this.activeVault) +
                    '&path=' + encodeURIComponent(this.activePath)
        const res = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'text/plain; charset=utf-8' },
          body: this.noteRaw
        })
        if (!res.ok) throw new Error('HTTP ' + res.status)
        this.isDirty = false
        this.saveStatus = 'saved'
        setTimeout(() => { if (this.saveStatus === 'saved') this.saveStatus = '' }, 2000)
      } catch(e) {
        this.saveStatus = 'error'
        console.error('save:', e)
      }
    },

    saveStatusText() {
      return { saving: 'Saving…', saved: '✓ Saved', error: '✗ Error' }[this.saveStatus] || ''
    },

    // ── preview click (wikilinks) ─────────────────
    async handlePreviewClick(e) {
      const a = e.target.closest('a.wikilink')
      if (!a) return
      e.preventDefault()
      const vault = a.dataset.vault || this.activeVault
      const path = a.dataset.path
      if (path) {
        this.openNote(vault, path)
        return
      }
      // missing link — try resolving by name
      const name = a.dataset.name
      if (!name) return
      try {
        const res = await fetch('/api/resolve?name=' + encodeURIComponent(name) + '&vault=' + encodeURIComponent(this.activeVault))
        if (res.ok) {
          const d = await res.json()
          this.openNote(d.vault, d.path)
        }
      } catch(e) { console.error('resolve wikilink:', e) }
    },

    // ── copy wikilink ─────────────────────────────
    async copyNoteLink() {
      const name = this.activePath.split('/').pop().replace(/\.md$/, '')
      const link = '[[' + name + ']]'
      try {
        await navigator.clipboard.writeText(link)
      } catch(e) {
        // fallback for older mobile browsers
        const ta = document.createElement('textarea')
        ta.value = link
        ta.style.position = 'fixed'; ta.style.opacity = '0'
        document.body.appendChild(ta)
        ta.focus(); ta.select()
        document.execCommand('copy')
        document.body.removeChild(ta)
      }
      this.copyLinkDone = true
      setTimeout(() => { this.copyLinkDone = false }, 2000)
    },

    // ── status bar context ────────────────────────
    sbContext() {
      // note open → word/char/page counts
      if (this.activePath) {
        const raw = this.noteRaw || ''
        const stripped = raw.replace(/^---[\s\S]*?---\n?/, '').trim()
        const words = stripped ? stripped.split(/\s+/).filter(Boolean).length : 0
        const chars = stripped.length
        const pages = Math.max(1, Math.round(words / 250))
        const pLabel = pages === 1 ? '1 page' : pages + ' pages'
        return `<span class="sb-num">${words.toLocaleString()}</span> words &nbsp;·&nbsp; <span class="sb-num">${chars.toLocaleString()}</span> chars &nbsp;·&nbsp; <span class="sb-num">${pLabel}</span>`
      }
      // folder active → notes + subfolders in current cwd
      if (this.activeVault) {
        const dirs = this.currentDirs().length
        const files = this.currentFiles().length
        const dLabel = dirs === 1 ? '1 subfolder' : dirs + ' subfolders'
        const fLabel = files === 1 ? '1 note' : files + ' notes'
        if (dirs > 0 && files > 0) return `<span class="sb-num">${fLabel}</span> &nbsp;·&nbsp; <span class="sb-num">${dLabel}</span>`
        if (dirs > 0) return `<span class="sb-num">${dLabel}</span>`
        if (files > 0) return `<span class="sb-num">${fLabel}</span>`
        return '<span class="sb-dim">empty</span>'
      }
      // nothing loaded → global totals
      if (this.totalNotes > 0) {
        const parts = this.vaultStats.map(vs => `${vs.name} <span class="sb-num">${vs.noteCount}</span>`).join(' &nbsp;·&nbsp; ')
        return `<span class="sb-num">${this.totalNotes.toLocaleString()}</span> notes &nbsp;·&nbsp; ${parts}`
      }
      return ''
    },

    // ── note title + toolbar breadcrumb ───────────
    noteTitle() {
      if (!this.activePath) return ''
      return this.activePath.split('/').pop().replace(/\.md$/, '')
    },

    // segments of the active path excluding filename
    activeBreadcrumbs() {
      if (!this.activePath) return []
      const parts = this.activePath.split('/')
      parts.pop() // remove filename
      return parts.filter(Boolean)
    },

    // click a breadcrumb segment in the toolbar → navigate sidebar to that dir
    async navigateToSegment(i) {
      const segs = this.activeBreadcrumbs()
      const dir = segs.slice(0, i + 1).join('/')
      // enterDir reloads the tree and sets cwd — works even if vault hasn't changed
      await this.enterDir(this.activeVault, dir)
      this.activePath = '' // deselect note so folder view shows
    },

    // ── search ────────────────────────────────────
    async doSearch() {
      if (!this.searchQuery.trim()) { this.searchResults = []; return }
      try {
        const url = '/api/search?q=' + encodeURIComponent(this.searchQuery) +
                    '&vault=' + encodeURIComponent(this.activeVault)
        const res = await fetch(url)
        this.searchResults = await res.json()
        this.searchFocus = 0
      } catch(e) { console.error('search:', e) }
    },

    openSearchResult(idx) {
      const r = this.searchResults[idx]
      if (!r) return
      this.searchOpen = false
      this.openNote(r.vault, r.path)
    },

    highlightMatch(text, query) {
      if (!text || !query) return text || ''
      const terms = query.trim().split(/\s+/).map(t =>
        t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
      ).filter(Boolean)
      if (!terms.length) return text
      const re = new RegExp(`(${terms.join('|')})`, 'gi')
      return text.replace(re, '<mark>$1</mark>')
    },

    // ── recent files ──────────────────────────────
    _recordRecent(vault, path, title) {
      const key = 'vr-recent-' + vault
      const recent = JSON.parse(localStorage.getItem(key) || '[]')
      const filtered = recent.filter(r => r.path !== path)
      const updated = [{ vault, path, title }, ...filtered].slice(0, 7)
      localStorage.setItem(key, JSON.stringify(updated))
      this.recentFiles = updated
    },

    // ── new menu toggle ───────────────────────────
    toggleNewMenu(event) {
      if (this.newMenuOpen) { this.newMenuOpen = false; return }
      const rect = event.currentTarget.getBoundingClientRect()
      const menuW = 170, menuH = 84
      let x = rect.left
      let y = rect.bottom + 4
      if (x + menuW > window.innerWidth - 8) x = window.innerWidth - menuW - 8
      if (y + menuH > window.innerHeight - 8) y = rect.top - menuH - 4
      this.newMenuX = x
      this.newMenuY = y
      this.newMenuOpen = true
    },

    // ── modal helpers ─────────────────────────────
    openModal({ title, value = '', placeholder = '', confirmLabel = 'OK', onConfirm }) {
      this.modal = { open: true, title, value, placeholder, error: '', confirmLabel, onConfirm }
      this.$nextTick(() => this.$refs.modalInput?.focus())
    },

    confirmModal() {
      this.modal.error = ''
      const val = this.modal.value.trim()
      if (!val) { this.modal.error = 'Name cannot be empty.'; return }
      // basic filename validation: no / \ : * ? " < > |
      if (/[/\\:*?"<>|]/.test(val)) { this.modal.error = 'Invalid characters in name.'; return }
      if (this.modal.onConfirm) this.modal.onConfirm(val)
    },

    // ── create note ───────────────────────────────
    promptCreateNote() {
      const prefix = this.cwd ? this.cwd + '/' : ''
      this.openModal({
        title: 'New note',
        placeholder: 'Note name',
        confirmLabel: 'Create',
        onConfirm: async (name) => {
          const path = prefix + name + (name.endsWith('.md') ? '' : '.md')
          try {
            const res = await fetch('/api/note?vault=' + encodeURIComponent(this.activeVault) +
              '&path=' + encodeURIComponent(path), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ raw: '' })
            })
            if (res.status === 409) { this.modal.error = 'A note with that name already exists.'; return }
            if (!res.ok) { this.modal.error = 'Error creating note.'; return }
            this.modal.open = false
            await this.enterDir(this.activeVault, this.cwd)
            await this.openNote(this.activeVault, path)
            this.setMode('edit')
          } catch(e) { this.modal.error = 'Network error.'; console.error('createNote:', e) }
        }
      })
    },

    // ── delete note ───────────────────────────────
    async deleteNote(path) {
      const name = path.split('/').pop().replace(/\.md$/, '')
      if (!confirm('Delete "' + name + '"?\n\nIt will be moved to .trash/ and can be recovered manually.')) return
      try {
        const res = await fetch('/api/note?vault=' + encodeURIComponent(this.activeVault) +
          '&path=' + encodeURIComponent(path), { method: 'DELETE' })
        if (!res.ok) { alert('Error deleting note.'); return }
        if (this.activePath === path) {
          this.activePath = ''
          this.noteRaw = ''
          this.noteHtml = ''
          this.noteFrontmatter = {}
          this.backlinks = []
        }
        await this.enterDir(this.activeVault, this.cwd)
        // remove from recents
        const key = 'vr-recent-' + this.activeVault
        const recent = JSON.parse(localStorage.getItem(key) || '[]').filter(r => r.path !== path)
        localStorage.setItem(key, JSON.stringify(recent))
        this.recentFiles = recent
      } catch(e) { alert('Network error.'); console.error('deleteNote:', e) }
    },

    // ── rename/move note ──────────────────────────
    promptRenameNote(path) {
      const oldName = path.split('/').pop().replace(/\.md$/, '')
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : ''
      this.openModal({
        title: 'Rename note',
        value: oldName,
        placeholder: 'New name',
        confirmLabel: 'Rename',
        onConfirm: async (newName) => {
          const newPath = (dir ? dir + '/' : '') + newName + (newName.endsWith('.md') ? '' : '.md')
          if (newPath === path) { this.modal.open = false; return }
          try {
            const res = await fetch('/api/move?vault=' + encodeURIComponent(this.activeVault) +
              '&from=' + encodeURIComponent(path) +
              '&to=' + encodeURIComponent(newPath), { method: 'POST' })
            if (res.status === 409) { this.modal.error = 'A note with that name already exists.'; return }
            if (!res.ok) { this.modal.error = 'Error renaming note.'; return }
            this.modal.open = false
            await this.enterDir(this.activeVault, this.cwd)
            if (this.activePath === path) {
              await this.openNote(this.activeVault, newPath)
            }
          } catch(e) { this.modal.error = 'Network error.'; console.error('renameNote:', e) }
        }
      })
    },

    // ── create folder ─────────────────────────────
    promptCreateFolder(inDir) {
      const prefix = (inDir !== undefined ? inDir : this.cwd) ? (inDir !== undefined ? inDir : this.cwd) + '/' : ''
      this.openModal({
        title: 'New folder',
        placeholder: 'Folder name',
        confirmLabel: 'Create',
        onConfirm: async (name) => {
          const path = prefix + name
          try {
            const res = await fetch('/api/folder?vault=' + encodeURIComponent(this.activeVault) +
              '&path=' + encodeURIComponent(path), { method: 'POST' })
            if (res.status === 409) { this.modal.error = 'A folder with that name already exists.'; return }
            if (!res.ok) { this.modal.error = 'Error creating folder.'; return }
            this.modal.open = false
            await this.enterDir(this.activeVault, this.cwd)
          } catch(e) { this.modal.error = 'Network error.'; console.error('createFolder:', e) }
        }
      })
    },

    // ── delete folder ─────────────────────────────
    async deleteFolder(path) {
      const name = path.split('/').pop()
      if (!confirm('Delete folder "' + name + '"?\n\nAll notes inside will be moved to .trash/ and can be recovered manually.')) return
      try {
        const res = await fetch('/api/folder?vault=' + encodeURIComponent(this.activeVault) +
          '&path=' + encodeURIComponent(path), { method: 'DELETE' })
        if (!res.ok) { alert('Error deleting folder.'); return }
        // if we were inside it, navigate up
        if (this.cwd === path || this.cwd.startsWith(path + '/')) {
          const parent = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : ''
          await this.enterDir(this.activeVault, parent)
        } else {
          await this.enterDir(this.activeVault, this.cwd)
        }
        // clear note if it was inside deleted folder
        if (this.activePath && (this.activePath.startsWith(path + '/') || this.activePath === path)) {
          this.activePath = ''; this.noteRaw = ''; this.noteHtml = ''; this.noteFrontmatter = {}; this.backlinks = []
        }
      } catch(e) { alert('Network error.'); console.error('deleteFolder:', e) }
    },

    // ── context menu ──────────────────────────────
    openCtxMenu(event, item) {
      const items = []
      if (!item.isDir) {
        items.push({ label: 'Open', action: () => this.openNote(this.activeVault, item.path) })
        items.push({ label: 'Rename', action: () => this.promptRenameNote(item.path) })
        items.push({ label: 'Delete', danger: true, action: () => this.deleteNote(item.path) })
      } else {
        items.push({ label: 'Open folder', action: () => this.enterDir(this.activeVault, item.path) })
        items.push({ label: 'New note here', action: () => { this.cwd = item.path; this.promptCreateNote() } })
        items.push({ label: 'New folder here', action: () => this.promptCreateFolder(item.path) })
        items.push({ label: 'Delete folder', danger: true, action: () => this.deleteFolder(item.path) })
      }
      // position near cursor but keep inside viewport
      const margin = 8
      const menuW = 160, menuH = items.length * 36 + 8
      let x = event.clientX, y = event.clientY
      if (x + menuW > window.innerWidth - margin) x = window.innerWidth - menuW - margin
      if (y + menuH > window.innerHeight - margin) y = window.innerHeight - menuH - margin
      this.ctxMenu = { open: true, x, y, items }
    },

    // ── settings ──────────────────────────────────
    toggleDark() {
      this.darkMode = !this.darkMode
      document.documentElement.setAttribute('data-theme', this.darkMode ? 'dark' : 'light')
      localStorage.setItem('vr-dark', this.darkMode ? '1' : '0')
    },
